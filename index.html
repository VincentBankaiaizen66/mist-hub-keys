<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mist Hub Key Generator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(45deg, #8000ff, #cc00ff); /* Neon purple gradient */
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        /* Sparking Particle Effect Overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
            pointer-events: none;
        }

        /* Discord Invite Box */
        .discord-box {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.5); /* Purple glow */
            max-width: 400px;
            animation: float 3s ease-in-out infinite;
            position: absolute;
            top: 60%;
            transform: translateY(-50%);
        }

        .discord-box h2 {
            margin: 0 0 15px 0;
            font-size: 24px;
            color: #cc00ff; /* Neon purple title */
        }

        .discord-box p {
            margin: 10px 0;
            font-size: 16px;
        }

        .discord-box a {
            color: #00ffff; /* Cyan link color for contrast */
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        .discord-box a:hover {
            color: #ff00ff; /* Bright magenta on hover */
            text-decoration: underline;
        }

        /* Popup Styles */
        .popup {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); /* Glowing cyan edge */
            max-width: 300px;
            animation: float 3s ease-in-out infinite;
            position: absolute;
            top: 30%;
            transform: translateY(-50%);
        }

        @keyframes float {
            0% { transform: translateY(-10px); }
            50% { transform: translateY(10px); }
            100% { transform: translateY(-10px); }
        }

        .popup h2 {
            margin: 0;
            font-size: 24px;
        }

        .popup button {
            background: #00ffff; /* Cyan glow */
            border: none;
            padding: 10px 20px;
            margin: 10px 0;
            cursor: pointer;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
        }

        .popup .caution {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }

        /* Footer Phrase - Black and Bigger */
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #000000; /* Black as requested */
            font-size: 24px; /* Bigger as requested */
            font-weight: bold;
            text-shadow: 0 0 5px #ffffff; /* White glow for visibility on dark bg */
        }

        /* Canvas for 3D Starfield and Sparks */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -2;
        }

        /* Responsive for Mobile */
        @media (max-width: 600px) {
            .popup {
                max-width: 90%;
                top: 25%;
            }
            .discord-box {
                max-width: 90%;
                top: 60%;
            }
            .footer {
                font-size: 18px; /* Slightly smaller on mobile for fit */
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet"> <!-- Futuristic font -->
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="popup">
        <h2>Mist Hub Key Generator</h2>
        <button onclick="generateKey()">Click here to generate a key for 12 hours</button>
        <div class="caution">
            <p>Your key will appear here.</p>
            <p>Key: Copy after you generate Mist Hub key for free use.</p>
        </div>
    </div>

    <div class="discord-box">
        <h2>Join MistHub Discord Server</h2>
        <p>The key is in the Discord server under "Scripts" Category</p>
        <p><a href="https://discord.gg/rPcSctCfWC" target="_blank">Join Discord Server</a></p>
    </div>

    <div class="footer">Script & key system made by vincent</div>

    <script>
        // 3D Starfield Animation with Sparking Effects
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];
        let sparks = [];
        const numStars = 200; // Low count for performance
        const numSparks = 50; // Number of sparking particles

        function initStars() {
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width * 2 - canvas.width,
                    y: Math.random() * canvas.height * 2 - canvas.height,
                    z: Math.random() * canvas.width,
                    speed: Math.random() * 0.5 + 0.5
                });
            }
        }

        function initSparks() {
            for (let i = 0; i < numSparks; i++) {
                sparks.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() * 2 - 1) * 2,
                    speedY: (Math.random() * 2 - 1) * 2,
                    life: Math.random() * 30 + 20, // Frames of life
                    maxLife: Math.random() * 30 + 20,
                    color: `hsl(${Math.random() * 60 + 270}, 100%, ${Math.random() * 50 + 50}%)` // Purple-white spark tones
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw stars
            ctx.fillStyle = '#ffffff';
            for (let star of stars) {
                const sx = (star.x / star.z) * (canvas.width / 2) + canvas.width / 2;
                const sy = (star.y / star.z) * (canvas.height / 2) + canvas.height / 2;
                const size = (1 - star.z / canvas.width) * 5;
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();

                star.z -= star.speed;
                if (star.z <= 0) {
                    star.z = canvas.width;
                    star.x = Math.random() * canvas.width * 2 - canvas.width;
                    star.y = Math.random() * canvas.height * 2 - canvas.height;
                }
            }
            // Draw sparks
            for (let i = 0; i < sparks.length; i++) {
                let spark = sparks[i];
                ctx.fillStyle = spark.color;
                ctx.globalAlpha = spark.life / spark.maxLife;
                ctx.beginPath();
                ctx.arc(spark.x, spark.y, spark.size, 0, Math.PI * 2);
                ctx.fill();

                spark.x += spark.speedX;
                spark.y += spark.speedY;
                spark.life -= 1;

                if (spark.life <= 0) {
                    sparks[i] = {
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 3 + 1,
                        speedX: (Math.random() * 2 - 1) * 2,
                        speedY: (Math.random() * 2 - 1) * 2,
                        life: Math.random() * 30 + 20,
                        maxLife: Math.random() * 30 + 20,
                        color: `hsl(${Math.random() * 60 + 270}, 100%, ${Math.random() * 50 + 50}%)`
                    };
                }
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(drawStars);
        }

        initStars();
        initSparks();
        drawStars();

        // Resize Handling
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Mobile Tilt Support (3D Effect)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                const tiltX = event.beta / 90; // Normalize
                const tiltY = event.gamma / 90;
                for (let star of stars) {
                    star.x += tiltY * 2;
                    star.y += tiltX * 2;
                }
            });
        }

        // Placeholder Key Generator Function (Customize as needed)
        function generateKey() {
            alert('Generated Key: ' + Math.random().toString(36).substring(2, 15)); // Example; replace with real logic
        }
    </script>
</body>
</html>
