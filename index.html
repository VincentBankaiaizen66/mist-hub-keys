<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MistHub Discord Invite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: 0;
            padding: 0;
            background: #000; /* Fallback for devices that can't play video */
        }

        /* Video Background */
        #background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures video covers the screen without distortion */
            z-index: -2;
        }

        /* Overlay to ensure text readability over video */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Semi-transparent overlay for contrast */
            z-index: -1;
        }

        /* Discord Invite Box */
        .discord-box {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3), 0 0 15px rgba(147, 51, 234, 0.2); /* Cyan and purple glow */
            max-width: 450px;
            width: 90%;
            animation: float 4s ease-in-out infinite;
            
            position: relative;
            margin: auto;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }

        .discord-box h2 {
            margin: 0 0 20px 0;
            font-size: 28px;
            color: #00ffff; /* Cyan title for contrast */
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .discord-box p {
            margin: 15px 0;
            font-size: 18px;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .discord-box a {
            color: #cc00ff; /* Neon purple link */
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            transition: color 0.3s, text-shadow 0.3s;
            display: inline-block;
            padding: 10px 20px;
            background: rgba(147, 51, 234, 0.2);
            border-radius: 8px;
            margin-top: 10px;
        }

        .discord-box a:hover {
            color: #ff00ff; /* Bright magenta on hover */
            text-shadow: 0 0 8px rgba(255, 0, 255, 0.6);
            background: rgba(147, 51, 234, 0.4);
        }

        /* Footer Phrase */
        .footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
            z-index: 1;
        }

        /* Volume Control Container */
        .volume-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            z-index: 2;
        }

        .volume-control button {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .volume-control button:hover {
            color: #00ffff;
        }

        .volume-control input[type="range"] {
            width: 100px;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #00ffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .volume-control input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #00ffff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        /* Responsive for Mobile and Tablets */
        @media (max-width: 768px) {
            .discord-box {
                padding: 20px;
                width: 85%;
            }
            .discord-box h2 {
                font-size: 22px;
            }
            .discord-box p {
                font-size: 16px;
            }
            .discord-box a {
                font-size: 18px;
                padding: 8px 16px;
            }
            .footer {
                font-size: 16px;
                bottom: 10px;
            }
            .volume-control {
                top: 10px;
                right: 10px;
                padding: 8px;
            }
            .volume-control input[type="range"] {
                width: 80px;
            }
        }

        @media (max-width: 480px) {
            .discord-box {
                padding: 15px;
                width: 90%;
            }
            .discord-box h2 {
                font-size: 20px;
            }
            .discord-box p {
                font-size: 14px;
            }
            .discord-box a {
                font-size: 16px;
                padding: 6px 12px;
            }
            .footer {
                font-size: 14px;
                bottom: 8px;
            }
            .volume-control {
                top: 8px;
                right: 8px;
                padding: 6px;
            }
            .volume-control input[type="range"] {
                width: 60px;
            }
            .volume-control button {
                font-size: 18px;
                padding: 3px;
            }
        }

        /* Ensure centering on all screen orientations */
        @media (orientation: landscape) and (max-height: 500px) {
            body {
                align-items: center;
            }
            .discord-box {
                margin: 0 auto;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Video -->
    <video id="background-video" autoplay loop playsinline>
        <source src="https://drive.google.com/uc?export=download&id=1c8Zsm6E1a_VqghYTCz8SBNGAeoFdPitr" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="video-overlay"></div>

    <!-- Volume Control -->
    <div class="volume-control">
        <button id="mute-toggle">🔊</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <!-- Discord Content -->
    <div class="discord-box">
        <h2>Join MistHub Discord Server</h2>
        <p>The key is in the Discord server under "Scripts" Category</p>
        <p><a href="https://discord.gg/rPcSctCfWC" target="_blank">Join Discord Server</a></p>
    </div>
    <div class="footer">Community Portal by Vincent</div>

    <script>
        // Video and Audio Control
        const video = document.getElementById('background-video');
        const muteToggle = document.getElementById('mute-toggle');
        const volumeSlider = document.getElementById('volume-slider');

        // Ensure video plays and loops
        video.addEventListener('loadeddata', () => {
            video.play().catch(error => {
                console.log('Video autoplay failed:', error);
            });
        });

        // Mute/Unmute Toggle
        muteToggle.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                muteToggle.textContent = '🔊';
                volumeSlider.value = video.volume;
            } else {
                video.muted = true;
                muteToggle.textContent = '🔇';
                volumeSlider.value = 0;
            }
        });

        // Volume Slider Control
        volumeSlider.addEventListener('input', () => {
            video.volume = volumeSlider.value;
            if (video.volume === 0) {
                video.muted = true;
                muteToggle.textContent = '🔇';
            } else {
                video.muted = false;
                muteToggle.textContent = '🔊';
            }
        });

        // Update slider if volume changes externally
        video.addEventListener('volumechange', () => {
            if (video.muted) {
                volumeSlider.value = 0;
                muteToggle.textContent = '🔇';
            } else {
                volumeSlider.value = video.volume;
                muteToggle.textContent = '🔊';
            }
        });
    </script>
</body>
</html>
