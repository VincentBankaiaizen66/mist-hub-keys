<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MistHub Discord Invite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); /* Dark cyberpunk indigo gradient */
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: 0;
            padding: 0;
        }

        /* Futuristic Grid Background Animation */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(transparent, transparent 20px, rgba(0, 255, 255, 0.1) 20px, rgba(0, 255, 255, 0.1) 22px),
                        repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(147, 51, 234, 0.1) 20px, rgba(147, 51, 234, 0.1) 22px);
            z-index: -1;
            animation: gridMove 30s linear infinite;
            opacity: 0.4;
        }

        @keyframes gridMove {
            0% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-50px) translateX(-50px); }
            100% { transform: translateY(0) translateX(0); }
        }

        /* Discord Invite Box */
        .discord-box {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3), 0 0 15px rgba(147, 51, 234, 0.2); /* Cyan and purple glow */
            max-width: 450px;
            width: 90%;
            animation: float 4s ease-in-out infinite;
            
            position: relative;
            margin: auto;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }

        .discord-box h2 {
            margin: 0 0 20px 0;
            font-size: 28px;
            color: #00ffff; /* Cyan title for contrast */
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .discord-box p {
            margin: 15px 0;
            font-size: 18px;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .discord-box a {
            color: #cc00ff; /* Neon purple link */
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            transition: color 0.3s, text-shadow 0.3s;
            display: inline-block;
            padding: 10px 20px;
            background: rgba(147, 51, 234, 0.2);
            border-radius: 8px;
            margin-top: 10px;
        }

        .discord-box a:hover {
            color: #ff00ff; /* Bright magenta on hover */
            text-shadow: 0 0 8px rgba(255, 0, 255, 0.6);
            background: rgba(147, 51, 234, 0.4);
        }

        /* Footer Phrase */
        .footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
            z-index: 1;
        }

        /* Canvas for Particle Effects */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        /* Responsive for Mobile and Tablets */
        @media (max-width: 768px) {
            .discord-box {
                padding: 20px;
                width: 85%;
            }
            .discord-box h2 {
                font-size: 22px;
            }
            .discord-box p {
                font-size: 16px;
            }
            .discord-box a {
                font-size: 18px;
                padding: 8px 16px;
            }
            .footer {
                font-size: 16px;
                bottom: 10px;
            }
        }

        @media (max-width: 480px) {
            .discord-box {
                padding: 15px;
                width: 90%;
            }
            .discord-box h2 {
                font-size: 20px;
            }
            .discord-box p {
                font-size: 14px;
            }
            .discord-box a {
                font-size: 16px;
                padding: 6px 12px;
            }
            .footer {
                font-size: 14px;
                bottom: 8px;
            }
        }

        /* Ensure centering on all screen orientations */
        @media (orientation: landscape) and (max-height: 500px) {
            body {
                align-items: center;
            }
            .discord-box {
                margin: 0 auto;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="discord-box">
        <h2>Join MistHub Discord Server</h2>
        <p>The key is in the Discord server under "Scripts" Category</p>
        <p><a href="https://discord.gg/rPcSctCfWC" target="_blank">Join Discord Server</a></p>
    </div>
    <div class="footer">Community Portal by Vincent</div>

    <script>
        // Lightweight Particle Animation for Background
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        // Set canvas size to window size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let particles = [];
        const numParticles = 100; // Reduced for performance on mobile

        function initParticles() {
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() * 1 - 0.5) * 0.5,
                    speedY: (Math.random() * 1 - 0.5) * 0.5,
                    color: Math.random() > 0.5 ? 'rgba(0, 255, 255, 0.6)' : 'rgba(147, 51, 234, 0.6)' // Cyan or Purple
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let particle of particles) {
                ctx.fillStyle = particle.color;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();

                particle.x += particle.speedX;
                particle.y += particle.speedY;

                // Wrap around screen edges
                if (particle.x < 0) particle.x = canvas.width;
                if (particle.x > canvas.width) particle.x = 0;
                if (particle.y < 0) particle.y = canvas.height;
                if (particle.y > canvas.height) particle.y = 0;
            }
            requestAnimationFrame(drawParticles);
        }

        initParticles();
        drawParticles();

        // Resize Handling for Canvas
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles(); // Reinitialize particles to cover new canvas size
        });

        // Handle orientation change for mobile devices
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 100); // Small delay to ensure correct dimensions
        });
    </script>
</body>
</html>
